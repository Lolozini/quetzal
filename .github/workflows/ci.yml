name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.23"
  GOTOOLCHAIN: local

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint deploy/quetzal

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: npm --prefix web run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: unit tests
        run: go test -race ./...
      - name: build
        run: go build ./...

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      # Build the Quetzal image so the config.files render path (which copies the
      # renderer out of this image) is exercised end-to-end.
      - name: Build image
        run: docker build -t quetzal:e2e .
      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: quetzal-e2e
          node_image: kindest/node:v1.31.0
      - name: Load image into kind
        run: kind load docker-image quetzal:e2e --name quetzal-e2e
      - name: e2e tests (kind)
        # kind-action points the default kubeconfig at the cluster.
        env:
          QUETZAL_E2E_IMAGE: quetzal:e2e
        run: go test -tags e2e -v -timeout 20m ./test/e2e/...

  image:
    runs-on: ubuntu-latest
    needs: [lint, test, web]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
