openapi: 3.0.3
info:
  title: Quetzal API
  version: "1.0"
  license:
    name: MIT
  description: |
    HTTP API for Quetzal, a Kubernetes-native game-server control plane.

    ## Authentication
    Most endpoints require authentication. Two credential types are accepted:

    - **API key** (recommended for scripts): send `Authorization: Bearer <token>`.
      Create a key under *Account → API keys*; it inherits the owner's
      permissions. Tokens are shown once at creation.
    - **Session cookie**: set by `POST /api/login` and used by the web UI.

    A key/session identifies a user; per-server access follows that user's
    ownership and granted subuser permissions. Admin-only endpoints are noted.

    ## Conventions
    - Request and response bodies are JSON unless noted.
    - Mutating requests made from a browser are subject to a same-origin check.
    - Authentication endpoints are rate limited (HTTP 429 with `Retry-After`).
servers:
  - url: /
    description: Same origin as the panel
tags:
  - name: Auth
    description: Setup, login, and the current user
  - name: Servers
    description: Server lifecycle, configuration and power
  - name: Console
    description: Live console (logs + attach) over WebSocket
  - name: Files
    description: File manager (exec into the running pod; requires the files permission)
  - name: SFTP
    description: SSH keys and per-server SFTP access
  - name: Schedules
    description: Cron schedules per server
  - name: Backups
    description: Backup configuration, backup and restore
  - name: Access
    description: Subuser access and per-server audit
  - name: Users
    description: User management (admin) and self-service
  - name: Email
    description: Self-service password reset and system SMTP settings
  - name: TwoFactor
    description: Opt-in TOTP two-factor authentication
  - name: APIKeys
    description: Bearer tokens for the API
  - name: Clusters
    description: Multi-cluster registry
  - name: Notifications
    description: Notification channels and the event feed
  - name: Databases
    description: Database host registry (admin) and per-server databases
  - name: Internal
    description: In-cluster callbacks (not for external use)

security:
  - bearerAuth: []
  - cookieAuth: []

paths:
  /api/setup/status:
    get:
      tags: [Auth]
      summary: Whether first-run setup is needed
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  needed: { type: boolean }
  /api/setup:
    post:
      tags: [Auth]
      summary: Create the first admin account (first run only)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "201":
          description: Admin created (session cookie set)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "409": { description: Setup already completed }
  /api/login:
    post:
      tags: [Auth]
      summary: Log in
      description: >
        On success a session cookie is set and the user is returned. If the
        account has 2FA enabled and no `code` was supplied, the response is
        `{ "twoFactorRequired": true }` with no session; resubmit with a TOTP or
        recovery code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "200":
          description: Authenticated, or a 2FA challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/User"
                  - type: object
                    properties:
                      twoFactorRequired: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/logout:
    post:
      tags: [Auth]
      summary: Log out (clears the session)
      responses:
        "204": { description: Logged out }
  /api/me:
    get:
      tags: [Auth]
      summary: The current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/me/password:
    post:
      tags: [Users]
      summary: Change your own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string, format: password }
                newPassword: { type: string, format: password }
      responses:
        "204": { description: Password changed }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/me/email:
    put:
      tags: [Email]
      summary: Set or clear your own email (used for password reset; not verified)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { email: { type: string, format: email } }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/forgot-password:
    post:
      tags: [Email]
      summary: Request a password-reset email
      description: >-
        Always responds 200 regardless of whether the identifier matched (no
        account enumeration); the email is sent only if the account exists, has
        an email, and SMTP + the public URL are configured. Rate-limited.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { identifier: { type: string, description: username or email } }
      responses:
        "200": { description: Always returned (uniform response) }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/reset-password:
    post:
      tags: [Email]
      summary: Complete a password reset with an emailed token
      description: >-
        Validates the single-use token, sets the new password, then invalidates
        the token and all of that user's sessions. 2FA is left untouched.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, format: password, minLength: 8 }
      responses:
        "204": { description: Password reset }
        "400": { description: Invalid/expired token or weak password }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/email-settings:
    get:
      tags: [Email]
      summary: Get system SMTP settings (admin)
      description: The password is never returned, only whether one is set.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured: { type: boolean }
                  host: { type: string }
                  port: { type: string }
                  username: { type: string }
                  from: { type: string }
                  tls: { type: string }
                  hasPassword: { type: boolean }
                  publicUrl: { type: string }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      tags: [Email]
      summary: Update system SMTP settings + public URL (admin)
      description: An empty host clears the SMTP config; a blank password keeps the stored one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                host: { type: string }
                port: { type: string }
                username: { type: string }
                password: { type: string, format: password }
                from: { type: string }
                tls: { type: string, enum: [starttls, tls, none] }
                publicUrl: { type: string }
      responses:
        "204": { description: Saved }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/email-settings/test:
    post:
      tags: [Email]
      summary: Send a test email with the stored settings (admin)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { to: { type: string, description: defaults to your account email } }
      responses:
        "204": { description: Sent }
        "400": { description: Not configured or no recipient }
        "502": { description: Send failed }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/database-hosts:
    get:
      tags: [Databases]
      summary: List database hosts (admin)
      responses:
        "200": { description: OK }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Databases]
      summary: Register a database host (admin)
      description: >-
        kind=external registers an existing MySQL/MariaDB (host/port/adminUser/
        adminPassword required). kind=managed has Quetzal deploy and own a MariaDB
        in-cluster (image/storageSize/namespace optional; root password generated).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DatabaseHostInput" }
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/database-hosts/{hid}:
    parameters:
      - { name: hid, in: path, required: true, schema: { type: integer } }
    patch:
      tags: [Databases]
      summary: Update a database host (admin)
      responses:
        "200": { description: Updated }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Databases]
      summary: Delete a database host (admin)
      description: Rejected with 409 while the host still holds databases.
      responses:
        "204": { description: Deleted }
        "409": { description: Host still has databases }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/database-hosts/{hid}/test:
    parameters:
      - { name: hid, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Databases]
      summary: Probe a host's connectivity (admin)
      responses:
        "200": { description: Host with refreshed reachability }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/servers/{id}/database-hosts:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Databases]
      summary: Hosts a server may create databases on (minimal view)
      description: Requires the databases permission; no admin secrets returned.
      responses:
        "200": { description: OK }
  /api/servers/{id}/databases:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Databases]
      summary: List a server's databases
      description: Requires the databases permission. Passwords are not included.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ServerDatabase" } }
    post:
      tags: [Databases]
      summary: Provision a database + scoped user for the server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostId]
              properties: { hostId: { type: integer } }
      responses:
        "201":
          description: Created (response includes the generated password once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServerDatabase" }
        "409": { description: Host at capacity }
        "502": { description: Provisioning failed on the host }
  /api/servers/{id}/databases/{dbid}:
    parameters:
      - $ref: "#/components/parameters/ServerId"
      - { name: dbid, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Databases]
      summary: A database with its current credentials (incl. password)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServerDatabase" }
    delete:
      tags: [Databases]
      summary: Drop the database and its user
      responses:
        "204": { description: Deleted }
  /api/servers/{id}/databases/{dbid}/rotate:
    parameters:
      - $ref: "#/components/parameters/ServerId"
      - { name: dbid, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Databases]
      summary: Rotate the database user's password
      responses:
        "200":
          description: New credentials (includes the new password)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServerDatabase" }

  /api/me/sshkeys:
    get:
      tags: [SFTP]
      summary: List your SSH public keys
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SSHKey" }
    post:
      tags: [SFTP]
      summary: Add an SSH public key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [publicKey]
              properties:
                name: { type: string }
                publicKey: { type: string, description: An authorized_keys line }
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SSHKey" }
        "400": { description: Invalid SSH public key }
  /api/me/sshkeys/{kid}:
    parameters:
      - { name: kid, in: path, required: true, schema: { type: integer } }
    delete:
      tags: [SFTP]
      summary: Delete one of your SSH keys
      responses:
        "204": { description: Deleted }
  /api/servers/{id}/sftp:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [SFTP]
      summary: SFTP connection details for a server
      description: >-
        Requires the files permission. Port is the assigned NodePort (0 until
        Kubernetes assigns it, or if no system image is configured — the server
        status reports the latter). Auth is key-only (register keys via
        /api/me/sshkeys); the username is cosmetic. Access is confined to the
        data directory. Revoking a key cuts live sessions, but the change takes
        up to a controller resync plus ConfigMap refresh to reach the pod.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }
                  username: { type: string }
                  port: { type: integer }

  /api/me/2fa/setup:
    post:
      tags: [TwoFactor]
      summary: Begin TOTP enrollment
      description: Returns a secret and otpauth URI; not active until enabled.
      responses:
        "200":
          description: Pending enrollment
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string }
                  uri: { type: string, description: otpauth:// provisioning URI }
        "409": { description: 2FA already enabled }
  /api/me/2fa/enable:
    post:
      tags: [TwoFactor]
      summary: Confirm enrollment with a code
      description: Activates 2FA and returns one-time recovery codes (shown once).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties: { code: { type: string } }
      responses:
        "200":
          description: 2FA enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  recoveryCodes:
                    type: array
                    items: { type: string }
        "400": { description: Invalid code or no enrollment in progress }
  /api/me/2fa/disable:
    post:
      tags: [TwoFactor]
      summary: Disable your 2FA (re-verifies a code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties: { code: { type: string } }
      responses:
        "204": { description: 2FA disabled }
        "400": { description: Invalid code or 2FA not enabled }

  /api/templates:
    get:
      tags: [Servers]
      summary: List available templates (eggs)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Template" }

  /api/servers:
    get:
      tags: [Servers]
      summary: List servers you can access
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Server" }
    post:
      tags: [Servers]
      summary: Create a server
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateServerRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Server" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: A server with this name already exists }
  /api/servers/{id}:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Servers]
      summary: Get a server
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Server" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Servers]
      summary: Update settings (exposure, hibernation, SFTP, startup variables, resources)
      description: >-
        All fields are optional; only the present ones change. Editing env or
        resources is applied on the next reconcile, which restarts the server.
        env is validated against the template's variable contract; a blank
        secret variable keeps the stored value. resources are re-checked against
        the owner's quota.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                expose: { $ref: "#/components/schemas/Expose" }
                hibernation: { $ref: "#/components/schemas/Hibernation" }
                sftp:
                  type: object
                  properties: { enabled: { type: boolean } }
                env:
                  type: object
                  additionalProperties: { type: string }
                  description: Startup variable values (editable variables only)
                resources: { $ref: "#/components/schemas/Resources" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Server" }
    delete:
      tags: [Servers]
      summary: Delete a server
      parameters:
        - name: keepData
          in: query
          schema: { type: boolean }
          description: Retain the data volume (overrides the server's stored policy).
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/servers/{id}/power:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    post:
      tags: [Servers]
      summary: Power action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [start, stop, restart, kill] }
      responses:
        "200":
          description: Action accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  action: { type: string }
                  result: { type: string }
  /api/servers/{id}/stats:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Servers]
      summary: Live CPU/memory (metrics-server) + network/disk (pod exec)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServerStats" }
  /api/servers/{id}/console:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Console]
      summary: Live console (WebSocket)
      description: >
        Upgrades to a WebSocket carrying console messages
        (`{type: stdout|stdin|status|error, data}`). stdout streams pod logs;
        stdin is delivered via the pod attach subresource.
      responses:
        "101": { description: Switching Protocols (WebSocket) }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/servers/{id}/files:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Files]
      summary: List a directory
      description: >
        Lists entries in `path` (relative to the server's data root). The server
        must be running. `path` is confined to the data root.
      parameters:
        - { name: path, in: query, schema: { type: string }, description: Directory relative to the data root }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name: { type: string }
                    size: { type: integer, format: int64 }
                    dir: { type: boolean }
        "409": { description: Server must be running to manage files }
    delete:
      tags: [Files]
      summary: Delete a file or directory (recursive)
      parameters:
        - { name: path, in: query, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        "400": { description: Refusing to delete the data root }
  /api/servers/{id}/files/content:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Files]
      summary: Read or download a file
      parameters:
        - { name: path, in: query, required: true, schema: { type: string } }
        - { name: download, in: query, schema: { type: string, enum: ["1"] }, description: Force a download response }
      responses:
        "200":
          description: File contents
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
            text/plain:
              schema: { type: string }
    put:
      tags: [Files]
      summary: Write (create/overwrite) a file
      description: Raw request body is written to `path` (truncating). Used for save and upload.
      parameters:
        - { name: path, in: query, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "204": { description: Written }
  /api/servers/{id}/files/archive:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Files]
      summary: Download a file or directory as a gzip tarball
      parameters:
        - { name: path, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: A .tar.gz stream
          content:
            application/gzip:
              schema: { type: string, format: binary }
  /api/servers/{id}/files/mkdir:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    post:
      tags: [Files]
      summary: Create a directory (mkdir -p)
      parameters:
        - { name: path, in: query, required: true, schema: { type: string } }
      responses:
        "204": { description: Created }
  /api/servers/{id}/files/rename:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    post:
      tags: [Files]
      summary: Rename / move a file or directory
      parameters:
        - { name: path, in: query, required: true, schema: { type: string }, description: Source (relative to data root) }
        - { name: to, in: query, required: true, schema: { type: string }, description: Destination (relative to data root) }
      responses:
        "204": { description: Renamed }

  /api/servers/{id}/schedules:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Schedules]
      summary: List schedules
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Schedule" }
    post:
      tags: [Schedules]
      summary: Create a schedule
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScheduleInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Schedule" }
  /api/servers/{id}/schedules/{sid}:
    parameters:
      - $ref: "#/components/parameters/ServerId"
      - name: sid
        in: path
        required: true
        schema: { type: integer }
    patch:
      tags: [Schedules]
      summary: Update a schedule
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScheduleInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Schedule" }
    delete:
      tags: [Schedules]
      summary: Delete a schedule
      responses:
        "204": { description: Deleted }

  /api/backup-config:
    get:
      tags: [Backups]
      summary: Get backup configuration (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupConfig" }
    put:
      tags: [Backups]
      summary: Set backup configuration (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BackupConfigInput" }
      responses:
        "204": { description: Saved }
  /api/servers/{id}/backups:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Backups]
      summary: List backups
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Backup" }
    post:
      tags: [Backups]
      summary: Trigger a backup
      responses:
        "201":
          description: Backup started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Backup" }
  /api/servers/{id}/backups/{bid}/restore:
    parameters:
      - $ref: "#/components/parameters/ServerId"
      - { name: bid, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Backups]
      summary: Restore from a backup
      responses:
        "201":
          description: Restore started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Backup" }
        "409": { description: Server must be stopped to restore }
  /api/servers/{id}/backups/{bid}:
    parameters:
      - $ref: "#/components/parameters/ServerId"
      - { name: bid, in: path, required: true, schema: { type: integer } }
    delete:
      tags: [Backups]
      summary: Delete a backup
      responses:
        "204": { description: Deleted }

  /api/servers/{id}/suspend:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    post:
      tags: [Servers]
      summary: Suspend a server (admin)
      responses:
        "204": { description: Suspended }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/servers/{id}/unsuspend:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    post:
      tags: [Servers]
      summary: Unsuspend a server (admin)
      responses:
        "204": { description: Unsuspended }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/servers/{id}/access:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Access]
      summary: List subuser access
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ServerAccess" }
    post:
      tags: [Access]
      summary: Grant a subuser scoped access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, permissions]
              properties:
                username: { type: string }
                permissions:
                  type: array
                  items:
                    type: string
                    enum: [view, power, console, schedules, backups, files, settings, delete]
      responses:
        "204": { description: Granted }
  /api/servers/{id}/access/{uid}:
    parameters:
      - $ref: "#/components/parameters/ServerId"
      - $ref: "#/components/parameters/UserId"
    delete:
      tags: [Access]
      summary: Revoke a subuser's access
      responses:
        "204": { description: Revoked }
  /api/servers/{id}/audit:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Access]
      summary: Recent audit entries for a server
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditEntry" }
  /api/audit:
    get:
      tags: [Access]
      summary: Panel-wide audit log (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditEntry" }

  /api/servers/{id}/notifications:
    parameters:
      - $ref: "#/components/parameters/ServerId"
    get:
      tags: [Notifications]
      summary: List a server's notification channels
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NotificationChannel" }
  /api/servers/{id}/events:
    parameters:
      - $ref: "#/components/parameters/ServerId"
      - $ref: "#/components/parameters/Limit"
    get:
      tags: [Notifications]
      summary: A server's event feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }
  /api/events:
    parameters:
      - $ref: "#/components/parameters/Limit"
    get:
      tags: [Notifications]
      summary: Panel-wide event feed (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }
  /api/notifications/channels:
    get:
      tags: [Notifications]
      summary: List global notification channels (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NotificationChannel" }
    post:
      tags: [Notifications]
      summary: Create a channel
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChannelInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationChannel" }
  /api/notifications/channels/{nid}:
    parameters:
      - { name: nid, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Notifications]
      summary: Get a channel
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationChannel" }
    patch:
      tags: [Notifications]
      summary: Update a channel (blank secrets keep the stored value)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChannelInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationChannel" }
    delete:
      tags: [Notifications]
      summary: Delete a channel
      responses:
        "204": { description: Deleted }
  /api/notifications/channels/{nid}/test:
    parameters:
      - { name: nid, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Notifications]
      summary: Send a test notification to a channel
      responses:
        "204": { description: Delivered }
        "502": { description: Delivery failed }
        "503": { description: Notifications are not enabled }

  /api/users:
    get:
      tags: [Users]
      summary: List users (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
    post:
      tags: [Users]
      summary: Create a user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
  /api/users/{uid}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    patch:
      tags: [Users]
      summary: Update a user's role/quotas (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    delete:
      tags: [Users]
      summary: Delete a user (admin)
      responses:
        "204": { description: Deleted }
  /api/users/{uid}/2fa/disable:
    parameters:
      - $ref: "#/components/parameters/UserId"
    post:
      tags: [TwoFactor]
      summary: Reset a user's 2FA (admin; lost-device recovery)
      responses:
        "204": { description: 2FA reset }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/apikeys:
    get:
      tags: [APIKeys]
      summary: List your API keys
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/APIKey" }
    post:
      tags: [APIKeys]
      summary: Create an API key (token shown once)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties: { name: { type: string } }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  key: { $ref: "#/components/schemas/APIKey" }
                  token: { type: string, description: The plaintext bearer token (shown once) }
  /api/apikeys/{kid}:
    parameters:
      - { name: kid, in: path, required: true, schema: { type: integer } }
    delete:
      tags: [APIKeys]
      summary: Revoke an API key
      responses:
        "204": { description: Revoked }

  /api/clusters:
    get:
      tags: [Clusters]
      summary: List clusters (non-admins get a reduced view)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Cluster" }
    post:
      tags: [Clusters]
      summary: Register a cluster by kubeconfig (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, kubeconfig]
              properties:
                name: { type: string }
                kubeconfig: { type: string, description: Stored encrypted at rest }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cluster" }
  /api/clusters/{cid}:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: integer } }
    patch:
      tags: [Clusters]
      summary: Update a cluster (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                kubeconfig: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cluster" }
    delete:
      tags: [Clusters]
      summary: Remove a cluster (admin)
      responses:
        "204": { description: Removed }
        "409": { description: Cluster still holds servers or is the local cluster }
  /api/clusters/{cid}/test:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Clusters]
      summary: Probe a cluster's connectivity (admin)
      responses:
        "200":
          description: Probe result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cluster" }
  /api/clusters/{cid}/nodes:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Clusters]
      summary: List a cluster's nodes (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ClusterNode" }

  /api/internal/wake:
    post:
      tags: [Internal]
      summary: Wake-on-connect callback (in-cluster activator)
      description: >
        HMAC-token authenticated; always returns 204 to avoid leaking server
        existence. Not for external callers.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WakeRequest" }
      responses:
        "204": { description: Processed (or ignored) }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/internal/active:
    post:
      tags: [Internal]
      summary: Activity heartbeat callback (in-cluster proxy)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WakeRequest" }
      responses:
        "204": { description: Processed (or ignored) }
        "429": { $ref: "#/components/responses/RateLimited" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: An API key created under Account → API keys.
    cookieAuth:
      type: apiKey
      in: cookie
      name: quetzal_session
      description: Session cookie set by POST /api/login (used by the web UI).
  parameters:
    ServerId:
      name: id
      in: path
      required: true
      schema: { type: integer }
      description: Server ID
    UserId:
      name: uid
      in: path
      required: true
      schema: { type: integer }
      description: User ID
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds to wait before retrying
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    Credentials:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
        email:
          type: string
          format: email
          description: Optional, captured at first-run setup for password reset
        code:
          type: string
          description: TOTP or recovery code (second login step when 2FA is enabled)
    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string, format: email }
        isAdmin: { type: boolean }
        maxServers: { type: integer, description: "0 = unlimited" }
        maxMemoryMB: { type: integer, format: int64 }
        maxCpuMilli: { type: integer, format: int64 }
        twoFactorEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
    UserInput:
      type: object
      properties:
        username: { type: string }
        password: { type: string, format: password }
        email: { type: string, format: email }
        isAdmin: { type: boolean }
        maxServers: { type: integer }
        maxMemoryMB: { type: integer, format: int64 }
        maxCpuMilli: { type: integer, format: int64 }
    Resources:
      type: object
      properties:
        memory: { type: string, example: "2Gi" }
        cpu: { type: string, example: "1" }
    Storage:
      type: object
      properties:
        type: { type: string, enum: [pvc, hostPath] }
        size: { type: string, example: "10Gi" }
        storageClass: { type: string }
        hostPath: { type: string }
        retainOnDelete: { type: boolean }
    Port:
      type: object
      properties:
        name: { type: string }
        port: { type: integer }
        protocol: { type: string, enum: [TCP, UDP] }
        primary: { type: boolean }
        nodePort: { type: integer }
    Expose:
      type: object
      properties:
        type: { type: string, enum: [ClusterIP, NodePort, LoadBalancer] }
        annotations:
          type: object
          additionalProperties: { type: string }
        preserveClientIP: { type: boolean }
    Hibernation:
      type: object
      properties:
        enabled: { type: boolean }
        idleMinutes: { type: integer }
        wakeOnConnect: { type: boolean }
        proxy: { type: boolean }
    Status:
      type: object
      properties:
        phase:
          type: string
          enum: [Installing, Starting, Running, Stopping, Stopped, Crashed, Suspended, Hibernated, Error]
        endpoints:
          type: array
          items: { type: string }
        address: { type: string }
        message: { type: string }
        crashCount: { type: integer }
    Server:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        displayName: { type: string }
        namespace: { type: string }
        desiredState: { type: string, enum: [Running, Stopped, Suspended] }
        ownerId: { type: integer }
        image: { type: string }
        resources: { $ref: "#/components/schemas/Resources" }
        storage: { $ref: "#/components/schemas/Storage" }
        ports:
          type: array
          items: { $ref: "#/components/schemas/Port" }
        expose: { $ref: "#/components/schemas/Expose" }
        hibernation: { $ref: "#/components/schemas/Hibernation" }
        hibernated: { type: boolean }
        sftp:
          type: object
          properties: { enabled: { type: boolean } }
        clusterId: { type: integer }
        status: { $ref: "#/components/schemas/Status" }
    CreateServerRequest:
      type: object
      required: [name, template]
      properties:
        name: { type: string }
        template: { type: string, description: Template slug }
        image: { type: string, description: Image ref (defaults to the template's) }
        memory: { type: string }
        cpu: { type: string }
        storage: { $ref: "#/components/schemas/Storage" }
        env:
          type: object
          additionalProperties: { type: string }
        expose: { $ref: "#/components/schemas/Expose" }
        hibernation: { $ref: "#/components/schemas/Hibernation" }
        cluster: { type: string, description: Target cluster slug (empty = local) }
        start: { type: boolean }
    DatabaseHostInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        kind: { type: string, enum: [external, managed] }
        host: { type: string }
        port: { type: integer }
        connectHost: { type: string }
        connectPort: { type: integer }
        adminUser: { type: string }
        adminPassword: { type: string, format: password }
        maxDatabases: { type: integer, description: "0 = unlimited" }
        namespace: { type: string, description: managed only }
        image: { type: string, description: managed only }
        storageSize: { type: string, description: managed only }
    ServerDatabase:
      type: object
      properties:
        id: { type: integer }
        serverId: { type: integer }
        hostId: { type: integer }
        databaseName: { type: string }
        username: { type: string }
        password: { type: string, description: only present on create/get/rotate }
        remote: { type: string, description: MySQL allowed-from host (default %) }
        host: { type: string, description: address to connect to }
        port: { type: integer }
        hostName: { type: string }
        createdAt: { type: string, format: date-time }
    ServerStats:
      type: object
      properties:
        cpuMillicores: { type: integer }
        memoryBytes: { type: integer, format: int64 }
        cpuLimit: { type: string }
        memoryLimit: { type: string }
        rxBytes: { type: integer, format: int64, description: Cumulative received bytes (derive a rate from successive samples) }
        txBytes: { type: integer, format: int64, description: Cumulative transmitted bytes }
        diskTotalBytes: { type: integer, format: int64 }
        diskUsedBytes: { type: integer, format: int64 }
    TemplateVariable:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        envVariable: { type: string }
        type: { type: string }
        default: { type: string }
        required: { type: boolean }
        options:
          type: array
          items: { type: string }
        editable: { type: boolean }
        secret: { type: boolean }
    TemplateImage:
      type: object
      properties:
        displayName: { type: string }
        ref: { type: string }
        default: { type: boolean }
    Template:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        category: { type: string }
        description: { type: string }
        images:
          type: array
          items: { $ref: "#/components/schemas/TemplateImage" }
        variables:
          type: array
          items: { $ref: "#/components/schemas/TemplateVariable" }
        ports:
          type: array
          items: { $ref: "#/components/schemas/Port" }
    Schedule:
      type: object
      properties:
        id: { type: integer }
        serverId: { type: integer }
        name: { type: string }
        cron: { type: string }
        action: { type: string, enum: [start, stop, restart, command, backup] }
        payload: { type: string }
        enabled: { type: boolean }
        nextRun: { type: string, format: date-time }
        lastRun: { type: string, format: date-time }
        lastStatus: { type: string }
    ScheduleInput:
      type: object
      required: [name, cron, action, enabled]
      properties:
        name: { type: string }
        cron: { type: string }
        action: { type: string, enum: [start, stop, restart, command, backup] }
        payload: { type: string }
        enabled: { type: boolean }
    Backup:
      type: object
      properties:
        id: { type: integer }
        serverId: { type: integer }
        direction: { type: string, enum: [backup, restore] }
        phase: { type: string, enum: [Pending, Running, Succeeded, Failed] }
        sourceId: { type: integer }
        sizeBytes: { type: integer, format: int64 }
        message: { type: string }
        createdAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
    BackupConfig:
      type: object
      properties:
        endpoint: { type: string }
        bucket: { type: string }
        prefix: { type: string }
        region: { type: string }
        useSSL: { type: boolean }
        keepLast: { type: integer }
        runnerImage: { type: string }
        configured: { type: boolean }
        hasCredentials: { type: boolean }
        hasPassword: { type: boolean }
    BackupConfigInput:
      type: object
      properties:
        endpoint: { type: string }
        bucket: { type: string }
        prefix: { type: string }
        region: { type: string }
        useSSL: { type: boolean }
        keepLast: { type: integer }
        runnerImage: { type: string }
        accessKey: { type: string }
        secretKey: { type: string }
        repoPassword: { type: string }
    Cluster:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        inCluster: { type: boolean }
        reachable: { type: boolean }
        version: { type: string }
        nodeCount: { type: integer }
        lastCheckedAt: { type: string, format: date-time }
        statusMessage: { type: string }
    ClusterNode:
      type: object
      properties:
        name: { type: string }
        ready: { type: boolean }
        version: { type: string }
        os: { type: string }
        cpu: { type: string }
        memory: { type: string }
        internalIP: { type: string }
    ServerAccess:
      type: object
      properties:
        id: { type: integer }
        serverId: { type: integer }
        userId: { type: integer }
        username: { type: string }
        permissions:
          type: array
          items: { type: string }
    AuditEntry:
      type: object
      properties:
        id: { type: integer }
        createdAt: { type: string, format: date-time }
        userId: { type: integer }
        username: { type: string }
        serverId: { type: integer }
        action: { type: string }
        detail: { type: string }
    Event:
      type: object
      properties:
        id: { type: integer }
        createdAt: { type: string, format: date-time }
        type: { type: string }
        serverId: { type: integer }
        userId: { type: integer }
        username: { type: string }
        message: { type: string }
        data:
          type: object
          additionalProperties: { type: string }
    NotificationChannel:
      type: object
      description: Secret config values are never returned, only whether they are set.
      properties:
        id: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        name: { type: string }
        type: { type: string, enum: [discord, webhook, email] }
        enabled: { type: boolean }
        serverId: { type: integer, description: "0 = global catch-all" }
        events:
          type: array
          items: { type: string }
          description: Event-type allow-list (empty = all)
        config:
          type: object
          additionalProperties: { type: string }
          description: Non-secret settings
        secrets:
          type: object
          additionalProperties: { type: boolean }
          description: Which secret keys are configured
    ChannelInput:
