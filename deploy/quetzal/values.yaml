image:
  repository: ghcr.io/lolozini/quetzal
  # tag defaults to the chart appVersion when empty
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Database. SQLite (default) keeps Quetzal self-contained on a PVC shared by the
# apiserver and controller; use Postgres for production / HA.
db:
  driver: sqlite
  dsn: "/data/quetzal.db?_pragma=busy_timeout(5000)&_pragma=journal_mode(WAL)"

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

service:
  type: ClusterIP
  port: 8080

# Node port pool for servers exposed via NodePort. Empty values fall back to the
# cluster's default service node port range (30000-32767). Quetzal tracks its own
# allocations in the database but is NOT aware of node ports Kubernetes assigns
# itself (LoadBalancer / health-check ports, or NodePort Services created outside
# Quetzal). On a shared cluster, narrow this to a block reserved for Quetzal (and
# open on your firewall) to avoid collisions.
nodePort:
  min: ""
  max: ""

ingress:
  enabled: false
  className: ""
  host: quetzal.example.com
  annotations: {}
  tls: false
  tlsSecretName: ""

# Mark session cookies Secure (enable when served over HTTPS).
secureCookies: false

# Trust X-Forwarded-For for per-client rate limiting. Auto-enabled when
# ingress.enabled is true; set explicitly if a different proxy fronts the panel.
# Only safe behind a proxy that appends the real client IP (the rightmost hop).
trustProxy: false

# Controller HA leader election (recommended; harmless with a single replica).
leaderElection: true
resync: "15s"

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
