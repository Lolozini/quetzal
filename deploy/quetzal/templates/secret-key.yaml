{{- $name := printf "%s-secretkey" (include "quetzal.fullname" .) -}}
{{- $found := lookup "v1" "Secret" .Release.Namespace $name -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "quetzal.labels" . | nindent 4 }}
type: Opaque
{{- if $found }}
# Reuse the existing key on upgrade so encrypted data stays decryptable.
data:
  secret-key: {{ index $found.data "secret-key" }}
{{- else }}
stringData:
  secret-key: {{ randAlphaNum 32 | quote }}
{{- end }}
