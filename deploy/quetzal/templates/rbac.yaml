{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "quetzal.serviceAccountName" . }}
  labels:
    {{- include "quetzal.labels" . | nindent 4 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "quetzal.fullname" . }}
  labels:
    {{- include "quetzal.labels" . | nindent 4 }}
rules:
  # Per-server namespaces and the workloads inside them.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "secrets", "configmaps", "resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Cluster-scoped PVs: switch reclaim policy to Retain when a server is deleted
  # with "keep data".
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pods + console (logs/attach) and restart/kill (delete).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/attach", "pods/exec"]
    verbs: ["create", "get"]
  # Node addresses, to report NodePort/LoadBalancer endpoints.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Per-server resource usage graphs (metrics-server).
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "quetzal.fullname" . }}
  labels:
    {{- include "quetzal.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "quetzal.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "quetzal.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Leader election lease lives in the release namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "quetzal.fullname" . }}-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quetzal.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "quetzal.fullname" . }}-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quetzal.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "quetzal.fullname" . }}-leaderelection
subjects:
  - kind: ServiceAccount
    name: {{ include "quetzal.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
